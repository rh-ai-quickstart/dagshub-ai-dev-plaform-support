services:
  dagshub-ai-dev-plaform-support-db:
    image: docker.io/postgres:16
    labels:
      com.quickstart.package: db
    environment:
      POSTGRES_DB: dagshub-ai-dev-plaform-support
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - dagshub-ai-dev-plaform-support_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dagshub-ai-dev-plaform-support"]
      interval: 5s
      timeout: 5s
      retries: 5
  dagshub-ai-dev-plaform-support-mcp:
    build:
      context: .
      dockerfile: packages/mcp/Containerfile
    ports:
      - "3001:3001"
    env_file:
      - packages/mcp/.env
    restart: unless-stopped

volumes:
  dagshub-ai-dev-plaform-support_postgres_data:
