[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dagshub-ai-dev-plaform-support-mcp"
dynamic = ["version"]
description = "Model Context Protocol server with FastMCP"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "Generated by AI QuickStart CLI" },
]
dependencies = [
    "fastmcp>=2.10.4",
    "fastapi>=0.104.0",
    "uvicorn>=0.24.0",
    "pydantic>=2.5.0",
    "pydantic-settings>=2.1.0",
    "structlog>=25.4.0",
    "python-dotenv>=1.1.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "httpx>=0.25.0",
    "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/example/dagshub-ai-dev-plaform-support"
Repository = "https://github.com/example/dagshub-ai-dev-plaform-support.git"

[tool.hatch.version]
path = "src/__init__.py"

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B"]

[tool.pytest.ini_options]
pythonpath = [".", "tests"]
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["src"]
