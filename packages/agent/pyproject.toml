[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dagshub-ai-dev-plaform-support-agent"
dynamic = ["version"]
description = "LangGraph AI agent with configurable LLM provider"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "Generated by AI QuickStart CLI" },
]
dependencies = [
    "fastapi>=0.104.0",
    "pydantic>=2.5.0",
    "pydantic-settings>=2.1.0",
    "langgraph>=0.3.24",
    "langchain>=0.3.25",
    "langchain-core>=0.3.59",
    "langchain-google-genai>=2.1.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "httpx>=0.25.0",
    "ruff>=0.1.0",
    "mypy>=1.7.0",
]
openai = [
    "langchain-openai>=0.3.24",
]
anthropic = [
    "langchain-anthropic>=0.3.18",
]
llamastack = [
    "llama-stack-client>=0.2.11",
]
postgres = [
    "langgraph-checkpoint-postgres>=2.0.17",
    "asyncpg>=0.29.0",
]
mcp = [
    "langchain-mcp-adapters>=0.0.7",
]

[project.urls]
Homepage = "https://github.com/example/dagshub-ai-dev-plaform-support"
Repository = "https://github.com/example/dagshub-ai-dev-plaform-support.git"

[tool.hatch.version]
path = "agent/__init__.py"

[tool.ruff]
extend = "../../configs/ruff/pyproject.toml"

[tool.pytest.ini_options]
pythonpath = [".", "tests"]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true

[tool.hatch.build.targets.wheel]
packages = ["agent"]
