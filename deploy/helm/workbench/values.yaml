workbench:
  enabled: true
  name: dagshub-llm-tutorial
  username: kubeadmin

  # DagsHub configuration
  dagsHub:
    host: "http://localhost:3000"

  image:
    repository: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/s2i-minimal-notebook
    tag: "2025.2"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "3"
      memory: "24Gi"
    limits:
      cpu: "6"
      memory: "24Gi"

  storage:
    size: "20Gi"
    storageClassName: ""  # Use default storage class

  shm:
    enabled: true
    size: "2Gi"

  setupJob:
    image: "registry.redhat.io/ubi8/ubi-minimal:8.9"

  # Git sync to automatically clone docs and notebooks
  gitSync:
    enabled: true  # Automatically clone content from repositories
    docs:
      repo: "https://github.com/DagsHub/dagshub-docs.git"
      branch: "main"
    notebook:
      repo: "https://github.com/rh-ai-quickstart/dagshub-ai-dev-plaform-support.git"
      branch: "main"
    image: "alpine/git:latest"
