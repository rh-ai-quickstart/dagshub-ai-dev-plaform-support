{{- if and .Values.workbench.enabled .Values.workbench.gitSync.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.workbench.name }}-git-clone
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.workbench.name }}
    app.kubernetes.io/component: git-clone
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"  # Runs before notebook starts
    "helm.sh/hook-delete-policy": before-hook-creation,hook-failed,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.workbench.name }}
        app.kubernetes.io/component: git-clone
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-pvc
        image: busybox:1.35
        command:
        - sh
        - -c
        - |
          echo "Waiting for PVC to be bound..."
          RETRIES=30
          COUNT=0
          until [ -d /workspace ] && [ -w /workspace ]; do
            COUNT=$((COUNT+1))
            if [ $COUNT -ge $RETRIES ]; then
              echo "PVC not ready after $RETRIES attempts, giving up"
              exit 1
            fi
            echo "PVC not yet available, waiting... (attempt $COUNT/$RETRIES)"
            sleep 5
          done
          echo "PVC is ready and writable"
        volumeMounts:
        - name: workspace
          mountPath: /workspace
      containers:
      - name: git-clone
        image: {{ .Values.workbench.gitSync.image }}
        command:
        - sh
        - -c
        - |
          set -e
          cd /workspace

          # Remove existing content
          if [ -d "docs" ]; then
            echo "Removing existing docs folder..."
            rm -rf docs
          fi
          if [ -f "hello_world_llm.ipynb" ]; then
            echo "Removing existing notebook..."
            rm -f hello_world_llm.ipynb
          fi

          # Clone DagsHub documentation with retry logic
          echo "Cloning DagsHub documentation: {{ .Values.workbench.gitSync.docs.repo }}"
          RETRIES=5
          COUNT=0
          docs_failed=false
          until git clone --depth 1 --branch {{ .Values.workbench.gitSync.docs.branch }} {{ .Values.workbench.gitSync.docs.repo }} /tmp/dagshub-docs; do
            COUNT=$((COUNT+1))
            if [ $COUNT -ge $RETRIES ]; then
              echo "Failed to clone docs repository after $RETRIES attempts"
              echo "This may be due to network issues. Documentation will use fallback ConfigMap."
              docs_failed=true
              break
            fi
            echo "Docs clone failed, retrying in 10 seconds... (attempt $COUNT/$RETRIES)"
            sleep 10
          done

          # Copy docs if clone was successful
          if [ "$docs_failed" != "true" ]; then
            if [ -d "/tmp/dagshub-docs/docs" ]; then
              echo "Copying docs folder to workspace..."
              # Show what we're about to copy
              echo "Source docs folder structure:"
              find "/tmp/dagshub-docs/docs" -type f -name "*.md" | head -20

              cp -rf "/tmp/dagshub-docs/docs" . || {
                echo "Error: Failed to copy docs folder"
                docs_failed=true
              }

              if [ "$docs_failed" != "true" ]; then
                # Verify the copy was successful
                if [ ! -d "docs" ]; then
                  echo "Error: docs folder not found after copy"
                  exit 1
                fi

                echo "Documentation successfully copied"
                echo "Documentation files summary:"
                find docs -type f -name "*.md" | wc -l | xargs echo "Total markdown files copied:"
                ls -la docs/ | head -10

                # Set proper permissions for OpenShift
                find docs -type f -exec chmod 644 {} \; 2>/dev/null || true
              fi
            else
              echo "Error: No docs directory found in repository"
              echo "Repository structure:"
              ls -la /tmp/dagshub-docs/
              docs_failed=true
            fi

            # Clean up docs repo
            rm -rf /tmp/dagshub-docs
          fi

          # Clone notebook repository with retry logic
          echo "Cloning notebook repository: {{ .Values.workbench.gitSync.notebook.repo }}"
          COUNT=0
          notebook_failed=false
          until git clone --depth 1 --branch {{ .Values.workbench.gitSync.notebook.branch }} {{ .Values.workbench.gitSync.notebook.repo }} /tmp/notebook-repo; do
            COUNT=$((COUNT+1))
            if [ $COUNT -ge $RETRIES ]; then
              echo "Failed to clone notebook repository after $RETRIES attempts"
              echo "This may be due to network issues. Notebook will use fallback ConfigMap."
              notebook_failed=true
              break
            fi
            echo "Notebook clone failed, retrying in 10 seconds... (attempt $COUNT/$RETRIES)"
            sleep 10
          done

          # Copy notebook if clone was successful
          if [ "$notebook_failed" != "true" ]; then
            if [ -f "/tmp/notebook-repo/deploy/helm/workbench/hello_world_llm.ipynb" ]; then
              echo "Copying notebook file to workspace..."
              cp "/tmp/notebook-repo/deploy/helm/workbench/hello_world_llm.ipynb" hello_world_llm.ipynb || {
                echo "Error: Failed to copy notebook file"
                notebook_failed=true
              }

              if [ "$notebook_failed" != "true" ]; then
                echo "Notebook successfully copied"
                ls -la hello_world_llm.ipynb
                chmod 644 hello_world_llm.ipynb 2>/dev/null || true
              fi
            else
              echo "Error: No hello_world_llm.ipynb file found in repository"
              echo "Repository structure in deploy/helm/workbench/:"
              ls -la /tmp/notebook-repo/deploy/helm/workbench/ 2>/dev/null || echo "Directory not found"
              notebook_failed=true
            fi

            # Clean up notebook repo
            rm -rf /tmp/notebook-repo
          fi

          # Report final status - don't exit with error, let setup handle fallbacks
          if [ "$docs_failed" = "true" ] && [ "$notebook_failed" = "true" ]; then
            echo "Both docs and notebook cloning failed - setup will use ConfigMaps"
          elif [ "$docs_failed" = "true" ]; then
            echo "Docs cloning failed - setup will use docs ConfigMap"
          elif [ "$notebook_failed" = "true" ]; then
            echo "Notebook cloning failed - setup will use notebook ConfigMap"
          else
            echo "Git content provisioning completed successfully"
          fi
        volumeMounts:
        - name: workspace
          mountPath: /workspace
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: {{ .Values.workbench.name }}-notebook-pvc
{{- end }}