{{- if .Values.workbench.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.workbench.name }}-notebook-setup
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.workbench.name }}
    app.kubernetes.io/component: notebook-setup
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-failed,hook-succeeded
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.workbench.name }}
        app.kubernetes.io/component: notebook-setup
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-workspace
        image: busybox:1.35
        command: ["/bin/sh"]
        args:
        - -c
        - |
          echo "Waiting for workspace PVC to be ready..."
          attempt=0
          max_attempts=30

          while [ $attempt -lt $max_attempts ]; do
            if [ -d /workspace ] && [ -w /workspace ]; then
              echo "Workspace is ready!"
              break
            fi
            echo "Attempt $((attempt+1))/$max_attempts - workspace not ready, waiting 5 seconds..."
            sleep 5
            attempt=$((attempt+1))
          done

          if [ $attempt -eq $max_attempts ]; then
            echo "Failed to verify workspace readiness after $max_attempts attempts"
            exit 1
          fi
        volumeMounts:
        - name: workspace
          mountPath: /workspace
      containers:
      - name: copy-notebook
        image: {{ .Values.workbench.setupJob.image | default "registry.redhat.io/ubi8/ubi-minimal:8.9" }}
        command: ["/bin/sh"]
        args:
        - -c
        - |
          set -e

          echo "Setting up DagsHub LLM Tutorial workspace..."

          # Always copy notebook from ConfigMap (keeping current approach)
          echo "Copying hello_world_llm.ipynb from ConfigMap..."
          cp /notebook-content/hello_world_llm.ipynb /workspace/hello_world_llm.ipynb

          {{- if .Values.workbench.gitDocs.enabled }}
          echo "Using git-sourced documentation from DagsHub official docs..."

          # Verify git docs were successfully cloned
          if [ ! -d /workspace/docs ]; then
            echo "ERROR: Documentation not found. Git docs provisioning may have failed."
            exit 1
          fi

          # Check if docs directory has content
          if [ -z "$(find /workspace/docs -name '*.md' | head -1)" ]; then
            echo "ERROR: No documentation files found. Git docs provisioning may have failed."
            exit 1
          fi

          echo "Git-sourced documentation verified successfully"
          echo "Found $(find /workspace/docs -name '*.md' | wc -l) documentation files"

          {{- else }}
          echo "Using ConfigMap-sourced documentation..."

          # Create docs directory and copy documentation
          echo "Setting up documentation..."
          mkdir -p /workspace/docs

          # Copy docs files from ConfigMap (each file is stored with path separators as underscores)
          if [ -d /docs-content ]; then
            echo "Copying docs from ConfigMap..."
            for file in /docs-content/*; do
              if [ -f "$file" ]; then
                # Convert underscore back to path separators
                basename=$(basename "$file")
                target_path=$(echo "$basename" | sed 's/_/\//g')
                target_dir=$(dirname "/workspace/$target_path")
                mkdir -p "$target_dir"
                cp "$file" "/workspace/$target_path"
                echo "Copied $basename -> $target_path"
              fi
            done
          else
            echo "Docs ConfigMap not mounted, skipping docs setup..."
          fi
          {{- end }}

          # Create a welcome README
          cat > /workspace/README.md << 'EOF'
          # DagsHub LLM Tutorial Workspace

          Welcome to your DagsHub LLM Tutorial workbench!

          ## Getting Started

          1. Open the `hello_world_llm.ipynb` notebook to start the tutorial
          2. Follow the step-by-step instructions to build an end-to-end LLM application
          3. Learn about RAG, fine-tuning, and evaluation with DagsHub

          ## What You'll Learn

          - Problem Definition for LLM applications
          - Data Preparation and vector embeddings
          - Model & Prompt Selection
          - Fine-tuning with LoRA
          - Testing & Evaluation with RAGAS

          ## DagsHub Integration

          This workbench is pre-configured to connect to your DagsHub instance at:
          `{{ .Values.workbench.dagsHub.host }}`

          ## Documentation

          {{- if .Values.workbench.gitDocs.enabled }}
          The `docs/` directory contains the latest DagsHub documentation
          pulled from the official repository.
          {{- else }}
          The `docs/` directory contains DagsHub documentation.
          {{- end }}

          Happy learning!
          EOF

          # Set proper permissions (only for files, not directories due to OpenShift restrictions)
          find /workspace -type f -exec chmod 644 {} \; 2>/dev/null || true

          # Create .jupyter directory for custom configuration
          mkdir -p /workspace/.jupyter

          echo "Setup complete! Notebook and documentation copied to workspace."
          echo "Contents of workspace:"
          ls -la /workspace/
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: notebook-content
          mountPath: /notebook-content
        {{- if not .Values.workbench.gitDocs.enabled }}
        - name: docs-content
          mountPath: /docs-content
        {{- end }}
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: {{ .Values.workbench.name }}-notebook-pvc
      - name: notebook-content
        configMap:
          name: {{ .Values.workbench.name }}-notebook-content
      {{- if not .Values.workbench.gitDocs.enabled }}
      - name: docs-content
        configMap:
          name: {{ .Values.workbench.name }}-docs-content
      {{- end }}
{{- end }}