{{- if and .Values.workbench.enabled .Values.workbench.gitDocs.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.workbench.name }}-git-docs
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.workbench.name }}
    app.kubernetes.io/component: git-docs
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"  # Runs before setup job
    "helm.sh/hook-delete-policy": before-hook-creation,hook-failed,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.workbench.name }}
        app.kubernetes.io/component: git-docs
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-pvc
        image: busybox:1.35
        command:
        - sh
        - -c
        - |
          echo "Waiting for PVC to be bound..."
          RETRIES=30
          COUNT=0
          until [ -d /workspace ] && [ -w /workspace ]; do
            COUNT=$((COUNT+1))
            if [ $COUNT -ge $RETRIES ]; then
              echo "PVC not ready after $RETRIES attempts, giving up"
              exit 1
            fi
            echo "PVC not yet available, waiting... (attempt $COUNT/$RETRIES)"
            sleep 5
          done
          echo "PVC is ready and writable"
        volumeMounts:
        - name: workspace
          mountPath: /workspace
      containers:
      - name: git-clone-docs
        image: alpine/git:latest
        command:
        - sh
        - -c
        - |
          set -e
          cd /workspace

          # Clean existing docs folder if it exists
          if [ -d "{{ .Values.workbench.gitDocs.targetPath }}" ]; then
            echo "Removing existing {{ .Values.workbench.gitDocs.targetPath }} folder..."
            rm -rf "{{ .Values.workbench.gitDocs.targetPath }}"
          fi

          # Clone the repository with retry logic
          echo "Cloning DagsHub documentation: {{ .Values.workbench.gitDocs.repository }}"
          RETRIES={{ .Values.workbench.gitDocs.retryAttempts }}
          COUNT=0
          until timeout {{ .Values.workbench.gitDocs.timeout }} git clone --depth 1 --branch {{ .Values.workbench.gitDocs.branch }} {{ .Values.workbench.gitDocs.repository }} /tmp/dagshub-docs; do
            COUNT=$((COUNT+1))
            if [ $COUNT -ge $RETRIES ]; then
              echo "Failed to clone repository after $RETRIES attempts"
              echo "This may be due to network issues. Documentation will use fallback ConfigMap."
              exit 0  # Exit gracefully to not block installation
            fi
            echo "Clone failed, retrying in {{ .Values.workbench.gitDocs.retryDelay }} seconds... (attempt $COUNT/$RETRIES)"
            sleep {{ .Values.workbench.gitDocs.retryDelay }}
          done

          # Copy docs folder to workspace
          echo "Copying {{ .Values.workbench.gitDocs.sourcePath }} folder to {{ .Values.workbench.gitDocs.targetPath }}..."
          if [ -d "/tmp/dagshub-docs/{{ .Values.workbench.gitDocs.sourcePath }}" ]; then
            # Show what we're about to copy
            echo "Source {{ .Values.workbench.gitDocs.sourcePath }} folder structure:"
            find "/tmp/dagshub-docs/{{ .Values.workbench.gitDocs.sourcePath }}" -type f -name "*.md" | head -20

            # Force copy docs folder with all contents
            cp -rf "/tmp/dagshub-docs/{{ .Values.workbench.gitDocs.sourcePath }}" "{{ .Values.workbench.gitDocs.targetPath }}" || {
              echo "Error: Failed to copy {{ .Values.workbench.gitDocs.sourcePath }} folder"
              exit 1
            }

            # Verify the copy was successful
            if [ ! -d "{{ .Values.workbench.gitDocs.targetPath }}" ]; then
              echo "Error: {{ .Values.workbench.gitDocs.targetPath }} folder not found after copy"
              exit 1
            fi

            echo "{{ .Values.workbench.gitDocs.targetPath }} folder successfully copied to workspace"
            echo "Documentation files summary:"
            find "{{ .Values.workbench.gitDocs.targetPath }}" -type f -name "*.md" | wc -l | xargs echo "Total markdown files copied:"
            ls -la "{{ .Values.workbench.gitDocs.targetPath }}/" | head -10

            # Set proper permissions for OpenShift
            find "{{ .Values.workbench.gitDocs.targetPath }}" -type f -exec chmod 644 {} \; 2>/dev/null || true
          else
            echo "Error: No {{ .Values.workbench.gitDocs.sourcePath }} directory found in repository"
            echo "Repository structure:"
            ls -la /tmp/dagshub-docs/
            exit 1
          fi

          # Clean up
          rm -rf /tmp/dagshub-docs

          echo "Documentation clone completed successfully"
        volumeMounts:
        - name: workspace
          mountPath: /workspace
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: {{ .Values.workbench.name }}-notebook-pvc
{{- end }}