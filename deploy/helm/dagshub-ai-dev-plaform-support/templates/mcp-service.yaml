{{- if .Values.mcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mcp.name }}
  labels:
    {{- include "dagshub-ai-dev-plaform-support.mcp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.mcp.service.type }}
  ports:
    - port: {{ .Values.mcp.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "dagshub-ai-dev-plaform-support.mcp.selectorLabels" . | nindent 4 }}
{{- end }}
