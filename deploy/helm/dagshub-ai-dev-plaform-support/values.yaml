# Default values for dagshub-ai-dev-plaform-support
global:
  imageRegistry: quay.io
  imageRepository: dagshub-ai-dev-plaform-support
  imageTag: latest
  imagePullPolicy: Always
  storageClass: ""

# Secrets configuration - these values should be overridden with actual secrets
secrets:
  # Database secrets
  POSTGRES_DB: "dagshub-ai-dev-plaform-support"
  POSTGRES_USER: "user"
  POSTGRES_PASSWORD: "changeme"

  # API secrets
  DEBUG: "false"
  ALLOWED_HOSTS: "*"

  # UI secrets
  VITE_API_BASE_URL: "http://localhost:8000"
  VITE_ENVIRONMENT: "production"

  # Agent secrets
  LLM_PROVIDER: "llamastack"
  LLM_MODEL: "meta-llama/Llama-3.2-3B-Instruct"
  LLM_API_KEY: ""
  MCP_ENABLED: "true"
  MCP_SSE_URL: "http://dagshub-ai-dev-plaform-support-mcp:3001/sse"
  LLAMASTACK_URL: "http://dagshub-ai-dev-plaform-support-llamastack:8321/v1"
# OpenShift Routes configuration
routes:
  enabled: true
  annotations: {}
  sharedHost: ""  # Set custom hostname or leave empty (will use ui.host fallback)
  ui:
    host: ""  # Used as fallback if sharedHost is empty
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  api:
    host: ""  # Ignored - uses sharedHost or ui.host
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

# API configuration
api:
  enabled: true
  name: dagshub-ai-dev-plaform-support-api
  image:
    repository: dagshub-ai-dev-plaform-support-api
    tag: latest
  service:
    type: ClusterIP
    port: 8000
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  healthCheck:
    enabled: true
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
# UI configuration
ui:
  enabled: true
  name: dagshub-ai-dev-plaform-support-ui
  image:
    repository: dagshub-ai-dev-plaform-support-ui
    tag: latest
  service:
    type: ClusterIP
    port: 8080
  replicas: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  healthCheck:
    enabled: true
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
# Database configuration using pgvector subchart
# Source: https://github.com/rh-ai-quickstart/ai-architecture-charts/tree/main/pgvector
# The subchart deploys PostgreSQL with pgvector extension for vector search
pgvector:
  enabled: true
  # Database credentials (used by subchart and application templates)
  secret:
    host: pgvector    # Service name created by subchart
    port: "5432"
    dbname: dagshub-ai-dev-plaform-support
    user: postgres
    password: changeme  # Change in production!
  # Storage configuration
  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce
  # Resource limits
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
# Database migration configuration
migration:
  enabled: true
  name: dagshub-ai-dev-plaform-support-migration
  image:
    repository: dagshub-ai-dev-plaform-support-db
    tag: latest
  restartPolicy: Never
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  resources:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
# MCP Server configuration
mcp:
  enabled: true
  name: dagshub-ai-dev-plaform-support-mcp
  image:
    repository: dagshub-ai-dev-plaform-support-mcp
    tag: latest
  service:
    type: ClusterIP
    port: 3001
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  healthCheck:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 10
# LlamaStack configuration using llama-stack subchart
# Source: https://github.com/rh-ai-quickstart/ai-architecture-charts
llama-stack:
  enabled: true
  service:
    port: 8321
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
# ServiceAccount
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod Security Context
podSecurityContext: {}

# Security Context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}
